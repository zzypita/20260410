<div id="app">
  <p>你點了 {{ count }} 次</p>
  <button @click="addOne">點我</button>
  <button @click="reset">重設</button>
</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
Vue.createApp({
  data() {
    return { count: 0 }
  },
  methods: {
    addOne() {
      this.count++
    },
    reset() {
      this.count = 0
    }
  }
}).mount("#app")
</script>
